<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestion des interventions — TimeTonic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
@keyframes tti-rise{from{transform:translateY(14px);}to{transform:translateY(0);}}
@keyframes tti-fade{from{opacity:.6;}to{opacity:1;}}
@keyframes tti-grow-h{from{transform:scaleX(.001);}to{transform:scaleX(1);}}
@keyframes tti-grow-v{from{transform:scaleY(.001);}to{transform:scaleY(1);}}
@keyframes tti-pin{0%{transform:translate(-50%,-128%) scale(.85);}60%{transform:translate(-50%,-92%) scale(1.05);}100%{transform:translate(-50%,-100%) scale(1);}}

#tti{
--navy:#1C2C39; --navy-2:#16242F; --navy-line:#2C3F4F; --paper:#F2F2F2;
  --ink:#1C2C39; --ink-soft:#5A6B78; --line:#ECE3E5; --line-2:#F2E9EB; --white:#FFFFFF;
  --c-blue:#1B9DE0; --c-blue-soft:#E4F4FD; --c-gold:#F6B91F; --c-gold-soft:#FEF3D6;
  --c-mag:#EC1E63; --c-mag-soft:#FCE0EA; --c-green:#16C293; --c-green-soft:#DBF7EE;
  --xl-green:#107C41; --xl-green-2:#0E6E3A; --xl-grid:#E1E1E1; --xl-head:#F3F4F4;
  --shadow:0 30px 70px -20px rgba(28,44,57,.45), 0 10px 24px -12px rgba(28,44,57,.30);
  --font:'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  width:100%; max-width:100%; display:block; overflow:hidden; position:relative; min-width:0;
  font-family:var(--font); color:var(--ink); -webkit-font-smoothing:antialiased;
  text-align:left; line-height:1.4; letter-spacing:normal; font-weight:400; font-size:16px;
  box-sizing:border-box;
}

#tti *{box-sizing:border-box; margin:0; padding:0;}
#tti /* ---- Scaling canvas ---- */
  .tt-canvas{
    position:absolute; top:0; left:0; width:1180px; height:760px; transform-origin:top left;
    background:var(--paper); border-radius:16px; box-shadow:var(--shadow);
    overflow:hidden; display:flex; user-select:none; -webkit-user-select:none;
  }
#tti .tt-main{flex:1; display:flex; flex-direction:column; min-width:0; background:var(--paper);}
#tti /* ---- Topbar ---- */
  .tt-topbar{ height:60px; flex:0 0 60px; display:flex; align-items:center; gap:14px; padding:0 22px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.55); }
#tti .tb-logo{ width:32px; height:32px; flex:0 0 32px; display:flex; align-items:center; justify-content:center; }
#tti .tb-logo svg{width:100%; height:100%; display:block;}
#tti .tb-titlewrap{display:flex; flex-direction:column; gap:1px; margin-right:6px;}
#tti .tb-title{display:flex; align-items:center; gap:8px; font-size:15px; font-weight:800; color:var(--ink); letter-spacing:.1px;}
#tti .tb-title .tb-emoji{font-size:16px;}
#tti .tb-sub{font-size:11px; color:var(--ink-soft); font-weight:600;}
#tti .tb-search{ flex:1; max-width:430px; height:38px; background:#fff; border:1px solid var(--line); border-radius:10px; display:flex; align-items:center; gap:9px; padding:0 14px; color:var(--ink-soft); font-size:13px; font-weight:500; box-shadow:0 1px 2px rgba(28,44,57,.04); }
#tti .tb-search svg{flex:0 0 auto;}
#tti .tb-add{ display:flex; align-items:center; justify-content:center; width:38px; height:38px; flex:0 0 38px; border-radius:10px; background:var(--ink); color:#fff; cursor:pointer; box-shadow:0 3px 8px rgba(28,44,57,.25); }
#tti .tb-add svg{width:18px; height:18px;}
#tti .tb-right{margin-left:auto; display:flex; align-items:center; gap:6px;}
#tti .tb-ico{ width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); cursor:pointer; position:relative; }
#tti .tb-ico:hover{background:#fff;}
#tti .tb-ico .dot{ position:absolute; top:3px; right:4px; min-width:15px; height:15px; padding:0 3px; border-radius:8px; background:var(--c-mag); color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; border:1.5px solid var(--paper); }
#tti .tb-ava{ width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#F58A8A,#E0457B); color:#fff; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; margin-left:4px; }
#tti /* ---- View tab strip ---- */
  .tt-tabs{ height:48px; flex:0 0 48px; display:flex; align-items:stretch; gap:2px; padding:0 16px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.35); }
#tti .tt-tabs .tabs-scroll{display:flex; align-items:stretch; gap:2px; min-width:0;}
#tti .vtab{ display:flex; align-items:center; gap:8px; padding:0 14px; cursor:pointer; font-size:13px; font-weight:600; color:var(--ink-soft); border:none; background:transparent; font-family:inherit; position:relative; white-space:nowrap; border-radius:9px 9px 0 0; transition:color .15s, background .15s; }
#tti .vtab svg{width:16px; height:16px; flex:0 0 16px;}
#tti .vtab:hover{color:var(--ink); background:rgba(255,255,255,.6);}
#tti .vtab.active{color:var(--ink); font-weight:700;}
#tti .vtab.active::after{content:''; position:absolute; left:10px; right:10px; bottom:0; height:3px; border-radius:3px 3px 0 0; background:var(--c-blue);}
#tti .vtab.xltab{color:var(--xl-green);}
#tti .vtab.xltab.active::after{background:var(--xl-green);}
#tti .vtab .vt-emoji{font-size:14px;}
#tti .tabs-right{margin-left:auto; display:flex; align-items:center; gap:8px; padding-left:10px;}
#tti .tt-play{ display:flex; align-items:center; gap:8px; height:34px; padding:0 14px; border-radius:9px; background:var(--c-blue); color:#fff; font-size:12.5px; font-weight:700; cursor:pointer; box-shadow:0 4px 10px -3px rgba(27,157,224,.6); white-space:nowrap; border:none; font-family:inherit; }
#tti .tt-play svg{width:14px; height:14px;}
#tti .tt-play.playing{background:var(--ink); box-shadow:0 4px 10px -3px rgba(28,44,57,.5);}
#tti /* ---- Context toolbar ---- */
  .tt-ctxbar{ height:42px; flex:0 0 42px; display:flex; align-items:center; gap:8px; padding:0 22px; border-bottom:1px solid var(--line); overflow:hidden; }
#tti .ctx-btn{ display:flex; align-items:center; gap:7px; padding:6px 11px; border-radius:8px; font-size:12px; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap; background:#fff; border:1px solid var(--line); }
#tti .ctx-btn:hover{color:var(--ink); border-color:#D6DEE3;}
#tti .ctx-btn svg{width:14px; height:14px;}
#tti .ctx-btn.solid{background:var(--ink); color:#fff; border-color:var(--ink);}
#tti .ctx-plain{display:flex; align-items:center; gap:7px; padding:6px 9px; border-radius:8px; font-size:12px; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap;}
#tti .ctx-plain:hover{background:#fff; color:var(--ink);}
#tti .ctx-plain svg{width:14px; height:14px;}
#tti .ctx-sep{width:1px; height:20px; background:var(--line); margin:0 2px;}
#tti .ctx-right{margin-left:auto; display:flex; align-items:center; gap:6px;}
#tti .ctx-legend{display:flex; align-items:center; gap:12px; flex-wrap:nowrap; overflow:hidden;}
#tti .ctx-legend .lg{display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:var(--ink); white-space:nowrap;}
#tti .ctx-legend .lg .lgdot{width:9px; height:9px; border-radius:3px;}
#tti .ctx-label{font-size:12px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:7px;}
#tti .ctx-label .ck{font-size:11px; font-weight:600; color:var(--ink-soft);}
#tti /* ---- Viewport ---- */
  .tt-viewport{flex:1; position:relative; overflow:hidden; background:var(--paper); display:flex; min-height:0;}
#tti .tt-canvas.mode-excel .tt-topbar,
#tti .tt-canvas.mode-excel .tt-tabs,
#tti .tt-canvas.mode-excel .tt-ctxbar{display:none;}
#tti .view-anim{animation:tti-fade .35s ease;}
#tti /* ============ EXCEL ============ */
  .xl{flex:1; min-width:0; min-height:0; display:flex; flex-direction:column; background:#fff;}
#tti .xl-titlebar{height:40px; flex:0 0 40px; display:flex; align-items:center; gap:12px; padding:0 14px; background:linear-gradient(180deg,#1A8C4E,#0E6E3A); color:#fff;}
#tti .xl-tb-dots{display:flex; gap:7px;}
#tti .xl-tb-dots span{width:11px; height:11px; border-radius:50%; display:block;}
#tti .xl-tb-file{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700;}
#tti .xl-tb-file svg{width:17px; height:17px;}
#tti .xl-tb-right{margin-left:auto; display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:600; opacity:.92; background:rgba(255,255,255,.16); padding:5px 11px; border-radius:7px;}
#tti .xl-tb-right svg{width:13px; height:13px;}
#tti .xl-menubar{height:30px; flex:0 0 30px; display:flex; align-items:center; gap:20px; padding:0 16px; background:#F7F8F7; border-bottom:1px solid var(--xl-grid); font-size:12px; font-weight:600; color:#6a6f6c;}
#tti .xl-menubar span{cursor:pointer;}
#tti .xl-menubar span.active{color:var(--xl-green); position:relative;}
#tti .xl-menubar span.active::after{content:''; position:absolute; left:-3px; right:-3px; bottom:-9px; height:2.5px; border-radius:2px; background:var(--xl-green);}
#tti .xl-formula{ height:30px; flex:0 0 30px; display:flex; align-items:center; gap:0; border-bottom:1px solid var(--xl-grid); background:#fff; font-size:12px; }
#tti .xl-namebox{width:84px; height:100%; display:flex; align-items:center; padding:0 10px; border-right:1px solid var(--xl-grid); color:#444; font-weight:600;}
#tti .xl-fx{width:40px; display:flex; align-items:center; justify-content:center; color:#888; font-style:italic; font-weight:700; border-right:1px solid var(--xl-grid); height:100%;}
#tti .xl-fcell{flex:1; padding:0 12px; color:#333; display:flex; align-items:center;}
#tti .xl-grid-wrap{flex:1; overflow:auto; position:relative;}
#tti table.xl-table{border-collapse:collapse; table-layout:fixed; font-size:12.5px; color:#222;}
#tti .xl-table th, #tti .xl-table td{border:1px solid var(--xl-grid); padding:0; height:26px; white-space:nowrap; overflow:hidden;}
#tti .xl-table thead th{ position:sticky; top:0; z-index:3; background:var(--xl-head); color:#5f6368; font-weight:600; text-align:center; height:22px; font-size:11px; }
#tti .xl-table .xl-corner{position:sticky; left:0; z-index:4; width:38px; background:var(--xl-head);}
#tti .xl-table .xl-rownum{ position:sticky; left:0; z-index:2; width:38px; background:var(--xl-head); color:#5f6368; font-weight:600; text-align:center; font-size:11px; }
#tti .xl-table tbody td{padding:0 9px; color:#222; font-weight:500;}
#tti .xl-table tbody tr:hover td{background:#F6FAF7;}
#tti .xl-table td.xl-num{text-align:right; font-variant-numeric:tabular-nums;}
#tti .xl-c1{width:38px;}
#tti .xl-cwide{width:230px;}
#tti .xl-cmed{width:150px;}
#tti .xl-csm{width:96px;}
#tti .xl-cxs{width:74px;}
#tti .xl-head-row td{background:#EAF3EE !important; font-weight:700 !important; color:#1a1a1a;}
#tti .xl-status-cell{display:flex; align-items:center; gap:6px;}
#tti .xl-status-cell .sd{width:8px; height:8px; border-radius:2px; flex:0 0 8px;}
#tti .xl-sheettabs{ height:30px; flex:0 0 30px; display:flex; align-items:stretch; background:#F3F4F4; border-top:1px solid var(--xl-grid); padding-left:8px; }
#tti .xl-sheet{ display:flex; align-items:center; padding:0 16px; font-size:12px; font-weight:600; color:#666; border-right:1px solid var(--xl-grid); cursor:pointer; }
#tti .xl-sheet.active{background:#fff; color:var(--xl-green); border-top:2px solid var(--xl-green); margin-top:-1px;}
#tti .xl-banner{ position:absolute; right:20px; bottom:46px; z-index:6; display:flex; align-items:center; gap:13px; background:#fff; border:1px solid var(--line); border-radius:13px; padding:12px 14px 12px 16px; box-shadow:0 18px 40px -14px rgba(28,44,57,.4); max-width:330px; }
#tti .xl-banner .xlb-txt{font-size:12.5px; color:var(--ink-soft); font-weight:600; line-height:1.4;}
#tti .xl-banner .xlb-txt b{color:var(--ink); font-weight:800;}
#tti .xl-banner .xlb-go{ display:flex; align-items:center; gap:8px; padding:10px 15px; border-radius:10px; background:var(--c-blue); color:#fff; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; box-shadow:0 5px 14px -4px rgba(27,157,224,.6); }
#tti .xl-banner .xlb-go svg{width:15px; height:15px;}
#tti /* ============ TABLE ============ */
  .tbl-wrap{flex:1; min-width:0; min-height:0; overflow-y:auto; padding:8px 0 20px;}
#tti table.tt-table{width:100%; border-collapse:collapse;}
#tti .tt-table thead th{ position:sticky; top:0; z-index:2; background:var(--paper); text-align:left; font-size:11.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#90A0AC; padding:14px 18px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
#tti .tt-table thead th.col-num{width:54px; text-align:center; padding-left:0;}
#tti .tt-table tbody tr{cursor:pointer; transition:background .12s;}
#tti .tt-table tbody tr:hover{background:#fff;}
#tti .tt-table tbody td{ padding:13px 18px; border-bottom:1px solid var(--line-2); font-size:14px; color:var(--ink); vertical-align:middle; white-space:nowrap; }
#tti .tt-table td.col-num{text-align:center; color:#B3BFC8; font-weight:600; font-size:12.5px; padding-left:0;}
#tti .deal-title{font-weight:700; line-height:1.25;}
#tti .deal-co{font-size:12px; color:var(--ink-soft); font-weight:600; margin-top:2px;}
#tti .pill{ display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12.5px; font-weight:700; white-space:nowrap; }
#tti .pill .pdot{width:7px; height:7px; border-radius:50%;}
#tti .prio{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600;}
#tti .prio .pbar{width:4px; height:14px; border-radius:2px;}
#tti .person{display:inline-flex; align-items:center; gap:9px;}
#tti .avatar{ width:28px; height:28px; border-radius:50%; flex:0 0 28px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:700; }
#tti .person .pname{font-size:13.5px; font-weight:500; color:var(--ink);}
#tti .cell-date{color:var(--ink-soft); font-weight:500; font-variant-numeric:tabular-nums;}
#tti .cell-zone{font-size:13px; color:var(--ink-soft); font-weight:600;}
#tti /* ============ KANBAN ============ */
  .kanban{flex:1; min-width:0; min-height:0; display:flex; gap:16px; padding:20px; overflow-x:auto;}
#tti .kb-col{flex:1 1 0; min-width:228px; display:flex; flex-direction:column; gap:12px;}
#tti .kb-col.drop-target .kb-cards{outline:2px dashed rgba(27,157,224,.5); outline-offset:3px; border-radius:14px; background:rgba(27,157,224,.04);}
#tti .kb-head{display:flex; align-items:center; gap:9px; padding:2px 4px;}
#tti .kb-head .pill{font-size:12.5px;}
#tti .kb-count{font-size:12px; font-weight:600; color:#9FACB5;}
#tti .kb-add{margin-left:auto; width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#9FACB5; cursor:pointer; font-size:17px;}
#tti .kb-add:hover{background:#fff; color:var(--ink);}
#tti .kb-cards{display:flex; flex-direction:column; gap:11px; flex:1; min-height:60px; border-radius:14px; padding:2px; overflow-y:auto;}
#tti .kb-card{ background:var(--cardc,#7C8A99); color:var(--cardtxt,#fff); border:none; border-radius:12px; padding:14px 15px; cursor:grab; box-shadow:0 3px 8px -1px rgba(28,44,57,.22); transition:box-shadow .15s, transform .15s; }
#tti .kb-card:hover{box-shadow:0 16px 30px -8px rgba(28,44,57,.45); transform:translateY(-1px);}
#tti .kb-card.dragging{opacity:.35;}
#tti .kb-card .kc-title{font-size:13.5px; font-weight:700; line-height:1.3; color:var(--cardtxt,#fff);}
#tti .kb-card .kc-co{font-size:12px; font-weight:600; color:var(--cardsub,rgba(255,255,255,.82)); margin-top:2px; margin-bottom:11px;}
#tti .kb-card .kc-meta{display:flex; align-items:center; justify-content:space-between; gap:10px;}
#tti .kb-card .kc-date{font-size:11.5px; font-weight:600; color:var(--cardsub,rgba(255,255,255,.82)); font-variant-numeric:tabular-nums; display:flex; align-items:center; gap:5px;}
#tti .kb-card .kc-date svg{width:12px; height:12px;}
#tti .kb-ghost{ position:absolute; z-index:50; pointer-events:none; width:228px; background:var(--cardc,#7C8A99); color:var(--cardtxt,#fff); border:none; border-radius:12px; padding:14px 15px; box-shadow:0 18px 40px -10px rgba(28,44,57,.45); transform:rotate(-1.5deg); }
#tti .kb-ghost .kc-title{font-size:13.5px; font-weight:700; line-height:1.3; color:var(--cardtxt,#fff);}
#tti .kb-ghost .kc-co{font-size:12px; font-weight:600; color:var(--cardsub,rgba(255,255,255,.82)); margin-top:2px; margin-bottom:11px;}
#tti .kb-ghost .kc-meta{display:flex; align-items:center; justify-content:space-between;}
#tti .kb-ghost .kc-date{font-size:11.5px; font-weight:600; color:var(--cardsub,rgba(255,255,255,.82));}
#tti .kc-ava{display:flex; align-items:center; gap:7px;}
#tti .kc-ava .avatar{width:22px; height:22px; font-size:9px; flex:0 0 22px; border:2px solid rgba(255,255,255,.6);}
#tti .kc-ava .nm{font-size:11.5px; font-weight:600; color:var(--cardsub,rgba(255,255,255,.82));}
#tti /* ============ TIMELINE ============ */
  .tl{flex:1; min-width:0; min-height:0; display:flex; flex-direction:column; overflow:hidden;}
#tti .tl-axis{ display:flex; height:38px; flex:0 0 38px; border-bottom:1px solid var(--line); padding-left:170px; background:rgba(255,255,255,.4); }
#tti .tl-axis .tlx{flex:1 1 0; border-left:1px solid var(--line); display:flex; flex-direction:column; justify-content:center; padding-left:9px; font-size:11px; font-weight:700; color:var(--ink-soft);}
#tti .tl-axis .tlx span{font-size:9.5px; font-weight:600; color:#A6B2BB; text-transform:uppercase; letter-spacing:.3px;}
#tti .tl-body{flex:1; overflow-y:auto; position:relative;}
#tti .tl-grid{position:absolute; top:0; bottom:0; left:170px; right:0; display:flex; pointer-events:none;}
#tti .tl-grid .tg{flex:1 1 0; border-left:1px solid var(--line-2);}
#tti .tl-lane{display:flex; min-height:76px; border-bottom:1px solid var(--line-2); position:relative;}
#tti .tl-lane-head{ width:170px; flex:0 0 170px; display:flex; align-items:center; gap:10px; padding:0 16px; position:sticky; left:0; z-index:2; background:var(--paper); border-right:1px solid var(--line); }
#tti .tl-lane-head .lh-name{font-size:13px; font-weight:700; color:var(--ink); line-height:1.2;}
#tti .tl-lane-head .lh-role{font-size:11px; font-weight:600; color:var(--ink-soft); margin-top:1px;}
#tti .tl-track{flex:1; position:relative; padding:10px 0;}
#tti .tl-bar{ position:absolute; height:50px; border-radius:10px; padding:7px 11px; color:#fff; cursor:pointer; box-shadow:0 4px 10px -3px rgba(28,44,57,.3); overflow:hidden; display:flex; flex-direction:column; justify-content:center; transition:transform .15s, box-shadow .15s; }
#tti .tl-bar:hover{transform:translateY(-1px); box-shadow:0 12px 22px -6px rgba(28,44,57,.4); z-index:5;}
#tti .tl-bar .tlb-t{font-size:12px; font-weight:700; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
#tti .tl-bar .tlb-s{font-size:10.5px; font-weight:600; opacity:.88; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
#tti .tl-today{position:absolute; top:0; bottom:0; width:2px; background:var(--c-mag); z-index:3;}
#tti .tl-today::before{content:"Aujourd'hui"; position:absolute; top:2px; left:5px; font-size:9px; font-weight:700; color:var(--c-mag); white-space:nowrap;}
#tti /* ============ GANTT ============ */
  .gantt{flex:1; min-width:0; min-height:0; display:flex; flex-direction:column; overflow:hidden; background:#fff;}
#tti .gantt-scroll{flex:1; overflow:auto; position:relative;}
#tti .gantt-inner{display:flex; flex-direction:column; min-width:1000px; position:relative;}
#tti .g-today{position:absolute; top:0; bottom:0; width:2px; background:var(--c-mag); z-index:6; pointer-events:none;}
#tti .g-today-lbl{position:absolute; top:4px; left:5px; font-size:9.5px; font-weight:800; color:#fff; background:var(--c-mag); padding:2px 6px; border-radius:5px; white-space:nowrap;}
#tti .g-bar.crit{box-shadow:0 0 0 2px var(--c-gold), 0 2px 6px -1px rgba(28,44,57,.3);}
#tti .g-links{position:absolute; top:0; left:0; z-index:5; pointer-events:none; overflow:visible;}
#tti .g-links path{fill:none; stroke:var(--c-gold); stroke-width:1.8;}
#tti .g-links polygon{fill:var(--c-gold);}
#tti .g-th{ display:grid; grid-template-columns:300px 1fr; position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid var(--line); }

const AVCOL = ['#6C8AE4','#E08A4E','#3FB68B','#D5638F','#8A6FD0','#3E9FC4','#C9A23E'];
function avColor(name){let s=0;for(const ch of name)s+=ch.charCodeAt(0);return AVCOL[s%AVCOL.length];}
function initials(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

function dnum(iso){const d=new Date(iso+'T00:00:00');return d.getTime();}
function fmtDate(iso){return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function fmtShort(iso){return new Date(iso+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}

/* map an ISO date to 0..1 within the window */
const _w0=dnum(WIN_START), _w1=dnum(WIN_END), _wspan=_w1-_w0;
function tpos(iso){return Math.max(0,Math.min(1,(dnum(iso)-_w0)/_wspan));}

/* ===================== TIMELINE ===================== */
function timelineHTML(){
  // month segments across the window
  const segs=[]; let d=new Date(_w0); d=new Date(d.getFullYear(),d.getMonth(),1);
  while(d.getTime()<=_w1){
    const y=d.getFullYear(), m=d.getMonth();
    const a=Math.max(new Date(y,m,1).getTime(),_w0), b=Math.min(new Date(y,m+1,1).getTime(),_w1);
    segs.push({label:d.toLocaleDateString('fr-FR',{month:'long'}),year:y,flex:(b-a)});
    d=new Date(y,m+1,1);
  }
  const axis = segs.map(s=>`<div class="tlx" style="flex:${s.flex}">${s.label.charAt(0).toUpperCase()+s.label.slice(1)} <span>${s.year}</span></div>`).join('');

  // weekly grid lines
  let grid=''; let wd=new Date(_w0);
  for(let t=_w0;t<=_w1;t+=86400000){const dt=new Date(t); if(dt.getDay()===1){grid+=`<div style="position:absolute;top:0;bottom:0;width:1px;background:var(--line-2);left:${tpos(dt.toISOString().slice(0,10))*100}%"></div>`;}}

  const lanes = TECH_ORDER.map(tech=>{
    const recs=ROWS.filter(r=>r.tech===tech);
    const bars=recs.map(r=>{
      const st=STATUS[r.s];
      const l=tpos(r.start)*100, w=Math.max(4,(tpos(r.due)-tpos(r.start))*100);
      return `<div class="tl-bar" data-id="${r.id}" style="left:${l}%;width:${w}%;background:${st.c};color:${st.txt}">
        <div class="tlb-t">${r.title}</div><div class="tlb-s">${r.client} · ${st.label}</div>
      </div>`;
    }).join('');
    return `<div class="tl-lane">
      <div class="tl-lane-head"><span class="avatar" style="background:${avColor(tech)}">${initials(tech)}</span><div><div class="lh-name">${tech.split(' ')[0]} ${tech.split(' ')[1].charAt(0)}.</div><div class="lh-role">${TECHS[tech].role}</div></div></div>
      <div class="tl-track">${bars}</div>
    </div>`;
  }).join('');

  const todayLeft=tpos(TODAY)*100;
  return `<div class="tl">
    <div class="tl-axis">${axis}</div>
    <div class="tl-body">
      <div class="tl-grid" style="position:absolute">${grid}<div class="tl-today" style="left:${todayLeft}%"></div></div>
      ${lanes}
    </div>
  </div>`;
}

/* ===================== GANTT ===================== */
function ganttHTML(){
  // week columns
  const weeks=[]; let t=_w0;
  // align to Monday on/just before window start
  let first=new Date(_w0); first.setDate(first.getDate()-((first.getDay()+6)%7));
  for(let wt=first.getTime(); wt<_w1; wt+=7*86400000){weeks.push(new Date(wt));}
  const nW=weeks.length;
  const weekCells=weeks.map(w=>`<div class="g-week">S${isoWeek(w)}</div>`).join('');
  // month header row (proportional)
  let msegs=[]; let dm=new Date(_w0); dm=new Date(dm.getFullYear(),dm.getMonth(),1);
  while(dm.getTime()<=_w1){const y=dm.getFullYear(),m=dm.getMonth();const a=Math.max(new Date(y,m,1).getTime(),_w0),b=Math.min(new Date(y,m+1,1).getTime(),_w1);msegs.push({label:dm.toLocaleDateString('fr-FR',{month:'long'}),flex:(b-a)});dm=new Date(y,m+1,1);}
  const monthCells=msegs.map(s=>`<div class="g-month" style="flex:${s.flex}">${s.label.charAt(0).toUpperCase()+s.label.slice(1)}</div>`).join('');

  const todayLeft=tpos(TODAY)*100;
  const gridCols = weeks.map((w,i)=>`<div class="gcol" style="left:${(i/nW)*100}%"></div>`).join('');
  const innerW = Math.max(1000,300+nW*64);
  const todayPx = 300 + (todayLeft/100)*(innerW-300);

  let rows='';
  TECH_ORDER.forEach(tech=>{
    const recs=ROWS.filter(r=>r.tech===tech).sort((a,b)=>dnum(a.start)-dnum(b.start));
    if(!recs.length) return;
    const gStart=Math.min(...recs.map(r=>dnum(r.start)));
    const gEnd=Math.max(...recs.map(r=>dnum(r.due)));
    const gl=(gStart-_w0)/_wspan*100, gw=(gEnd-gStart)/_wspan*100;
    const avg=Math.round(recs.reduce((s,r)=>s+r.prog,0)/recs.length);
    rows += `<div class="g-row group">
      <div class="g-left">
        <div class="gl-title"><span class="gl-caret">${ICO.caret}</span><span class="gtt">${tech} · ${TECHS[tech].metier}</span></div>
        <div class="gl-date">${fmtShort(new Date(gStart).toISOString().slice(0,10))}</div>
        <div class="gl-date">${fmtShort(new Date(gEnd).toISOString().slice(0,10))}</div>
      </div>
      <div class="g-right">${gridCols}
        <div class="g-bar group-bar" style="left:${gl}%;width:${gw}%"><span class="gb-fill" style="width:${avg}%"></span><span class="gb-pct">${avg}%</span></div>
      </div>
    </div>`;
    recs.forEach(r=>{
      const st=STATUS[r.s];
      const l=tpos(r.start)*100, w=Math.max(2.4,(tpos(r.due)-tpos(r.start))*100);
      const labelOutside = w<14;
      const crit = CRIT_IDS.has(r.id) ? ' crit' : '';
      rows += `<div class="g-row task" data-id="${r.id}" style="cursor:pointer">
        <div class="g-left">
          <div class="gl-title"><span class="gl-fileico">${ICO.file}</span><span class="gtt">${r.title}</span></div>
          <div class="gl-date">${fmtShort(r.start)}</div>
          <div class="gl-date">${fmtShort(r.due)}</div>
        </div>
        <div class="g-right">${gridCols}
          <div class="g-bar${crit}" style="left:${l}%;width:${w}%;background:${st.c}"><span class="gb-fill" style="width:${r.prog}%"></span>${labelOutside?'':`<span class="gb-pct">${r.prog}%</span>`}</div>
          ${labelOutside?`<span class="g-label" style="left:calc(${l+w}% + 8px)">${r.prog}%</span>`:''}
        </div>
      </div>`;
    });
  });

  return `<div class="gantt">
    <div class="gantt-scroll"><div class="gantt-inner" style="min-width:${innerW}px">
      <div class="g-th">
        <div class="g-left-head"><div class="glh">Tâche</div><div class="glh">Début</div><div class="glh">Fin</div></div>
        <div class="g-right-head">
          <div class="g-months">${monthCells}</div>
          <div class="g-weeks">${weekCells}</div>
        </div>
      </div>
      ${rows}
      <div class="g-today" style="left:${todayPx}px"><span class="g-today-lbl">Aujourd'hui</span></div>
    </div></div>
  </div>`;
}
function isoWeek(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dayNum=(date.getUTCDay()+6)%7;date.setUTCDate(date.getUTCDate()-dayNum+3);const firstThu=new Date(Date.UTC(date.getUTCFullYear(),0,4));return 1+Math.round(((date-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);}

      <!-- roads -->
      <g stroke="#FFFFFF" stroke-width="9" fill="none" opacity=".9" stroke-linecap="round">

      <!-- district labels -->
      <g fill="#8C99A1" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="15" opacity=".8">
        <text x="430" y="250">Centre</text>

        <text x="600" y="500">Neudorf</text>
        <text x="740" y="320">Esplanade</text>
        <text x="640" y="150">Robertsau</text>
        <text x="180" y="240">Cronenbourg</text>
      </g>
    </svg>
    ${pins}
    </div>
    <div class="map-zoom"><div data-z="in">＋</div><div data-z="out">−</div></div>
    <div class="map-layers"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div class="map-attrib">Plan © TimeTonic Maps</div>
  </div>`;
}

/* ===================== DASHBOARD ===================== */
function dashHTML(){
  const total=ROWS.length;
  const byStatus=STATUS.map((st,i)=>ROWS.filter(r=>r.s===i).length);
  const enCours=byStatus[2], termine=byStatus[3];
  const avg=Math.round(ROWS.reduce((s,r)=>s+r.prog,0)/total);

  // donut
  const R=70, C=2*Math.PI*R; let off=0;
  const segs=byStatus.map((n,i)=>{
    const frac=n/total, len=frac*C;
    const seg=`<circle r="${R}" cx="84" cy="84" fill="none" stroke="${STATUS[i].hex}" stroke-width="26" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" style="transition:stroke-dashoffset .6s"/>`;
    off+=len; return seg;
  }).join('');
  const donutLegend=STATUS.map((st,i)=>`<div class="dl"><span class="dld" style="background:${st.hex}"></span><span class="dln">${st.label}</span><span class="dlv">${byStatus[i]}</span></div>`).join('');

  // bars by sector
  const secKeys=Object.keys(SECTORS);
  const secCounts=secKeys.map(k=>ROWS.filter(r=>r.sector===k).length);
  const secMax=Math.max(...secCounts);
  const bars=secKeys.map((k,i)=>{
    const h=(secCounts[i]/secMax)*140+10;
    return `<div class="bar-col"><div class="bc-bar" style="height:${h}px;background:${SECTORS[k].hex};animation-delay:${i*0.06}s"><span class="bc-v">${secCounts[i]}</span></div><div class="bc-lbl">${k}</div></div>`;
  }).join('');

  // hbars: charge par technicien
  const techMax=Math.max(...TECH_ORDER.map(t=>ROWS.filter(r=>r.tech===t).length));
  const hbarsTech=TECH_ORDER.map((t,i)=>{
    const n=ROWS.filter(r=>r.tech===t).length;
    const open=ROWS.filter(r=>r.tech===t && r.s<3).length;
    return `<div class="hbar"><div class="hb-top"><span>${t}</span><span class="hbv">${open} en cours · ${n} total</span></div><div class="hb-track"><div class="hb-fill" style="width:${(n/techMax)*100}%;background:${avColor(t)};animation-delay:${i*0.07}s"></div></div></div>`;
  }).join('');

  // hbars: priorité
  const prioCounts=PRIO.map((p,i)=>ROWS.filter(r=>r.prio===i).length);
  const prioMax=Math.max(...prioCounts);
  const hbarsPrio=PRIO.map((p,i)=>`<div class="hbar"><div class="hb-top"><span>${p.label}</span><span class="hbv">${prioCounts[i]}</span></div><div class="hb-track"><div class="hb-fill" style="width:${(prioCounts[i]/prioMax)*100}%;background:${p.c};animation-delay:${i*0.07}s"></div></div></div>`).join('');

  const kpiIco=(p)=>`<div class="kpi-ico" style="background:${p.bg};color:${p.fg}">${p.svg}</div>`;
  return `<div class="dash">
    <div class="dash-tabs"><div class="dash-tab active">Vue d'ensemble</div><div class="dash-tab">Par technicien</div><div class="dash-tab">SLA</div></div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-top">${kpiIco({bg:'var(--c-blue-soft)',fg:'#1B9DE0',svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>'})}<span class="kpi-lbl">Interventions</span></div><div class="kpi-val">${total}</div><div class="kpi-sub">sur le trimestre en cours</div></div>
      <div class="kpi"><div class="kpi-top">${kpiIco({bg:'var(--c-mag-soft)',fg:'#EC1E63',svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'})}<span class="kpi-lbl">En cours</span></div><div class="kpi-val">${enCours}</div><div class="kpi-sub"><b>${byStatus[1]}</b> planifiées à suivre</div></div>
      <div class="kpi"><div class="kpi-top">${kpiIco({bg:'var(--c-green-soft)',fg:'#16C293',svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'})}<span class="kpi-lbl">Terminées</span></div><div class="kpi-val">${termine}</div><div class="kpi-sub">clôturées & validées</div></div>
      <div class="kpi"><div class="kpi-top">${kpiIco({bg:'var(--c-gold-soft)',fg:'#C98A00',svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-9"/><path d="M21 7v5h-5"/></svg>'})}<span class="kpi-lbl">Avancement</span></div><div class="kpi-val">${avg}%</div><div class="kpi-sub">progression moyenne</div></div>
    </div>
    <div class="dash-grid">
      <div class="card">
        <div class="card-h">Répartition par statut</div><div class="card-sub">12 interventions actives</div>
        <div class="donut-wrap">
          <div class="donut"><svg width="168" height="168" viewBox="0 0 168 168">${segs}</svg><div class="donut-center"><div class="dc-num">${total}</div><div class="dc-lbl">total</div></div></div>
          <div class="donut-legend">${donutLegend}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-h">Interventions par secteur</div><div class="card-sub">Répartition géographique</div>
        <div class="bars">${bars}</div>
      </div>
    </div>
    <div class="dash-grid">
      <div class="card"><div class="card-h">Charge par technicien</div><div class="card-sub">Interventions assignées</div><div class="hbars">${hbarsTech}</div></div>
      <div class="card"><div class="card-h">Répartition par priorité</div><div class="card-sub">Niveau d'urgence</div><div class="hbars">${hbarsPrio}</div></div>
    </div>
  </div>`;
}

</script>
<script>
/* ============================================================
   App — navigation, autoplay, modal, drag kanban, carte, scaling
   ============================================================ */
(function(){
function boot(){
  var ROOT=document.getElementById('tti');
  if(!ROOT || ROOT.dataset.ttiReady) return;
  ROOT.dataset.ttiReady='1';

  const $  =(s,el)=> (el||ROOT).querySelector(s.charAt(0)==='@'?'[data-tti="'+s.slice(1)+'"]':s);
  const $$ =(s,el)=> [...(el||ROOT).querySelectorAll(s)];

  /* ---- view registry ---- */
  const VIEWS=[
    {k:'excel',     l:'interventions.xlsx', xl:true, ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>'},
    {k:'table',     l:'Table',  ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>'},
    {k:'kanban',    l:'Kanban', ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="6" height="14" rx="1.5"/><rect x="10" y="3" width="6" height="10" rx="1.5"/><rect x="17" y="3" width="4" height="17" rx="1.5"/></svg>'},
    {k:'timeline',  l:'Timeline', ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h13M3 12h17M3 18h9"/><circle cx="19" cy="6" r="1.6" fill="currentColor" stroke="none"/><circle cx="14" cy="18" r="1.6" fill="currentColor" stroke="none"/></svg>'},
    {k:'gantt',     l:'Gantt', ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="9" height="3.5" rx="1.5"/><rect x="8" y="10" width="11" height="3.5" rx="1.5"/><rect x="5" y="16" width="8" height="3.5" rx="1.5"/></svg>'},
    {k:'map',       l:'Carte', ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>'},
    {k:'dashboard', l:'Tableau de bord', ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h6v8H3zM10 3h4v18h-4zM15 9h6v12h-6z"/></svg>'}
  ];

  let curView='excel';
  let curScale=1;
  let mapZoom=1;

  /* ---- build tab strip ---- */
  function buildTabs(){
    const scroll=$('.tabs-scroll');
    scroll.innerHTML=VIEWS.map(v=>`<button class="vtab ${v.xl?'xltab':''} ${v.k===curView?'active':''}" data-view="${v.k}">${v.ico}${v.l}</button>`).join('');
    $$('.vtab',scroll).forEach(b=>b.addEventListener('click',()=>{ stopPlay(); go(b.dataset.view); }));
  }
  function syncTabs(){ $$('.vtab').forEach(b=>b.classList.toggle('active',b.dataset.view===curView)); }

  /* ============ CONTEXT BAR ============ */
  const legendStatus = STATUS.map(st=>`<span class="lg"><span class="lgdot" style="background:${st.hex}"></span>${st.label}</span>`).join('');
  const legendSector = Object.entries(SECTORS).map(([k,v])=>`<span class="lg"><span class="lgdot" style="background:${v.hex};border-radius:50%"></span>${k}</span>`).join('');
  const btnFilter=`<div class="ctx-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>Filtrer</div>`;
  const btnSort=`<div class="ctx-plain"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5h10M11 9h7M11 13h4M3 17l3 3 3-3M6 18V4"/></svg>Trier</div>`;
  const btnGroup=`<div class="ctx-plain"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>Grouper</div>`;
  function ctxbarHTML(){
    const count=`<span class="ctx-plain" style="cursor:default">${ROWS.length} interventions</span>`;
    switch(curView){
      case 'excel':
        return `<span class="ctx-label" style="color:var(--xl-green)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8l8 8M16 8l-8 8"/></svg>interventions.xlsx</span><span class="ctx-label ck">Feuille « Interventions »</span>${count.replace('interventions','lignes')}<div class="ctx-right">${btnFilter}</div>`;
      case 'table':
        return `${btnFilter}${btnSort}${btnGroup}<div class="ctx-sep"></div><div class="ctx-legend">${legendStatus}</div><div class="ctx-right">${count}</div>`;
      case 'kanban':
        return `${btnFilter}<span class="ctx-plain" style="cursor:default">Groupé par <b style="color:var(--ink);margin-left:4px">Statut</b></span><div class="ctx-right">${count}</div>`;
      case 'timeline':
        return `<span class="ctx-plain" style="cursor:default">Échelle <b style="color:var(--ink);margin-left:4px">Mois</b></span><div class="ctx-sep"></div><span class="ctx-plain" style="cursor:default">Lignes : Technicien</span><div class="ctx-right"><div class="ctx-legend">${legendStatus}</div></div>`;
      case 'gantt':
        return `${btnFilter}<span class="ctx-plain" style="cursor:default">Groupé par Technicien</span><div class="ctx-sep"></div><span class="ctx-plain" style="cursor:default"><svg viewBox="0 0 24 24" fill="none" stroke="var(--c-gold)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Chemin critique</span><div class="ctx-right"><div class="ctx-legend">${legendStatus}</div></div>`;
      case 'map':
        return `<span class="ctx-label">Carte des interventions · Strasbourg</span><div class="ctx-sep"></div><span class="ctx-plain" style="cursor:default">Couleur = statut</span><div class="ctx-right"><div class="ctx-legend">${legendStatus}</div></div>`;
      case 'dashboard':
        return `<span class="ctx-label">Tableau de bord</span><div class="ctx-sep"></div><span class="ctx-plain" style="cursor:default">Période : <b style="color:var(--ink);margin-left:4px">Trimestre</b></span><div class="ctx-right"><div class="ctx-btn solid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Widget</div></div>`;
    }
    return '';
  }

  /* ============ GO TO VIEW ============ */
  function go(view){
    if(view===curView){ return; }
    curView=view;
    render(true);
  }
  function render(animate){
    syncTabs();
    $('[data-tti="canvas"]').classList.toggle('mode-excel', curView==='excel');
    $('@ctxbar').innerHTML=ctxbarHTML();
    const vp=$('@viewport');
    let html='';
    switch(curView){
      case 'excel': html=excelHTML(); break;
      case 'table': html=tableHTML(); break;
      case 'kanban': html=kanbanHTML(); break;
      case 'timeline': html=timelineHTML(); break;
      case 'gantt': html=ganttHTML(); break;
      case 'map': html=mapHTML(); break;
      case 'dashboard': html=dashHTML(); break;
    }
    vp.innerHTML=html;

    if(animate) entrance();
    wireView();
  }

  function entrance(){
    const vp=$('@viewport');
    if(curView==='table') $$('tbody tr',vp).forEach((tr,i)=>tr.style.animation=`tti-rise .5s cubic-bezier(.22,.8,.3,1) ${i*0.03}s backwards`);
    else if(curView==='kanban') $$('.kb-card',vp).forEach((c,i)=>c.style.animation=`tti-rise .5s cubic-bezier(.22,.8,.3,1) ${i*0.03}s backwards`);
    else if(curView==='timeline') $$('.tl-bar',vp).forEach((b,i)=>b.style.animation=`tti-rise .5s cubic-bezier(.22,.8,.3,1) ${i*0.03}s backwards`);
    else if(curView==='gantt') $$('.g-bar',vp).forEach((b,i)=>{b.style.animation=`tti-rise .5s cubic-bezier(.22,.8,.3,1) ${i*0.025}s backwards`;});
    else if(curView==='map') $$('.pin',vp).forEach((p,i)=>p.style.animationDelay=`${i*0.05}s`);
  }

  /* ============ WIRE PER-VIEW ============ */
  function wireView(){
    const vp=$('@viewport');
    // generic record clicks
    $$('[data-id]',vp).forEach(el=>{
      if(el.classList.contains('kb-card')) return; // drag-wired
      el.addEventListener('click',()=>{ stopPlay(); openPanel(el.dataset.id); });
    });
    // excel banner -> table
    const go2=$('[data-act="toView"]',vp);
    if(go2) go2.addEventListener('click',()=>{ stopPlay(); go(go2.dataset.view); });
    // sheet tabs (decorative active toggle)
    $$('.xl-sheet',vp).forEach(s=>s.addEventListener('click',()=>{$$('.xl-sheet',vp).forEach(x=>x.classList.remove('active')); if(!s.textContent.includes('＋')) s.classList.add('active');}));
    if(curView==='kanban') wireKanban();
    if(curView==='map') wireMap();
    if(curView==='dashboard') wireDash();
    if(curView==='gantt') wireGantt();
  }

  /* ============ GANTT critical-path arrows ============ */
  function wireGantt(){
    const inner=$('.gantt-inner',$('@viewport'));
    if(!inner) return;
    setTimeout(()=>{
      if(curView!=='gantt') return;
      const old=inner.querySelector('.g-links'); if(old) old.remove();
      const NS='http://www.w3.org/2000/svg';
      const svg=document.createElementNS(NS,'svg');
      svg.setAttribute('class','g-links');
      svg.setAttribute('width',inner.scrollWidth); svg.setAttribute('height',inner.scrollHeight);
      const ir=inner.getBoundingClientRect();
      const barOf=id=>{
        const row=inner.querySelector(`.g-row.task[data-id="${id}"] .g-bar`);
        if(!row) return null;
        const r=row.getBoundingClientRect();
        return {l:(r.left-ir.left)/curScale, r:(r.right-ir.left)/curScale, mid:(r.top+r.height/2-ir.top)/curScale};
      };
      CRIT_PATH.forEach(([a,b])=>{
        const A=barOf(a), B=barOf(b); if(!A||!B) return;
        const x1=A.r, y1=A.mid, x2=B.l-7, y2=B.mid;
        const d=`M${x1},${y1} h9 V${y2} H${x2}`;
        const p=document.createElementNS(NS,'path'); p.setAttribute('d',d); svg.appendChild(p);
        const ah=document.createElementNS(NS,'polygon');
        ah.setAttribute('points',`${x2},${y2-4} ${x2+7},${y2} ${x2},${y2+4}`); svg.appendChild(ah);
      });
      inner.appendChild(svg);
    }, 620);
  }

  /* ============ AUTOPLAY ============ */
  let playing=false, playTimer=null;
  function startPlay(){
    playing=true; updatePlayBtn();
    tickPlay();
  }
  function tickPlay(){
    playTimer=setTimeout(()=>{
      if(!playing) return;
      const idx=VIEWS.findIndex(v=>v.k===curView);
      const next=VIEWS[(idx+1)%VIEWS.length];
      go(next.k);
      tickPlay();
    }, curView==='excel'?2200:2900);
  }
  function stopPlay(){ playing=false; if(playTimer) clearTimeout(playTimer); updatePlayBtn(); }
  function updatePlayBtn(){
    const btn=$('@play');
    btn.classList.toggle('playing',playing);
    btn.innerHTML = playing
      ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>Lecture…'
      : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>Lecture auto';
  }
  $('@play').addEventListener('click',()=>{ playing?stopPlay():startPlay(); });

  /* ============ MODAL ============ */
  const checkIco='<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  function openPanel(id){
    const r=ROWS.find(x=>x.id===id); if(!r) return;
    const homeIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>';
    const clockIco='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
    const statusOpts=STATUS.map((st,idx)=>`<div class="status-opt ${idx===r.s?'current':''}" data-status="${idx}">${pillFor(idx)}${checkIco}</div>`).join('');

    $('@panel').innerHTML=`
      <div class="modal-head">
        <div class="mh-text">
          <div class="modal-eyebrow">🛠 ${r.ref} · ${r.sector}</div>
          <div class="modal-title">${r.title}</div>
          <div class="modal-co">${r.client} · ${r.site}</div>
        </div>
        <div class="modal-acts"><div class="ma" title="Plus">⋯</div><div class="ma" data-tti="panelClose" title="Fermer">✕</div></div>
      </div>
      <div class="modal-main">
        <div class="modal-rail">
          <div class="modal-tab active" data-tab="details">${homeIco}Détails</div>
          <div class="modal-tab" data-tab="activity">${clockIco}Activité</div>
        </div>
        <div class="modal-content">
          <div class="mpane active" data-pane="details">
            <div class="mgrid">
              <div class="mfield" data-tti="statusField">
                <div class="mf-label">Statut</div>
                <div class="mf-box editable" data-tti="statusBox"><span data-tti="statusCurrent">${pillFor(r.s)}</span><span class="chev"></span></div>
                <div class="status-menu" data-tti="statusMenu">${statusOpts}</div>
              </div>
              <div class="mfield"><div class="mf-label">Technicien</div><div class="mf-box">${personCell(r.tech)}</div></div>
              <div class="mfield"><div class="mf-label">Priorité</div><div class="mf-box">${prioCell(r.prio)}</div></div>
              <div class="mfield"><div class="mf-label">Secteur</div><div class="mf-box">📍 ${r.sector}</div></div>
              <div class="mfield"><div class="mf-label">Début</div><div class="mf-box sel">${fmtDate(r.start)}<span class="chev"></span></div></div>
              <div class="mfield"><div class="mf-label">Échéance</div><div class="mf-box sel">${fmtDate(r.due)}<span class="chev"></span></div></div>
              <div class="mfield"><div class="mf-label">Contact site</div><div class="mf-box">${r.contact}</div></div>
              <div class="mfield"><div class="mf-label">Téléphone</div><div class="mf-box">${r.tel}</div></div>
              <div class="mfield full"><div class="mf-label">Avancement</div><div class="mf-box" style="display:block;padding:14px 13px"><div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:8px"><span>${STATUS[r.s].label}</span><span>${r.prog}%</span></div><div style="height:9px;border-radius:6px;background:var(--paper);overflow:hidden"><div style="height:100%;border-radius:6px;width:${r.prog}%;background:${STATUS[r.s].hex}"></div></div></div></div>
            </div>
          </div>
          <div class="mpane" data-pane="activity">
            <div class="act"><div class="ad"><i></i><span class="line"></span></div><div><div class="at"><b>${r.tech.split(' ')[0]}</b> a fait passer l'intervention en <b>${STATUS[r.s].label}</b></div><div class="att">Il y a 3 heures</div></div></div>
            <div class="act"><div class="ad"><i style="background:var(--c-gold)"></i><span class="line"></span></div><div><div class="at">Rendez-vous confirmé avec <b>${r.contact}</b></div><div class="att">Hier · 14:20</div></div></div>
            <div class="act"><div class="ad"><i style="background:var(--c-green)"></i></div><div><div class="at">Intervention créée depuis <b>interventions.xlsx</b></div><div class="att">${fmtDate(r.start)}</div></div></div>
          </div>
        </div>
      </div>
      <div class="modal-foot"><button class="mbtn" data-tti="panelCancel">Annuler</button><button class="mbtn primary" data-tti="panelSave">Enregistrer</button></div>`;

    $('@panel').classList.add('open'); $('@scrim').classList.add('open');
    $('@panelClose').addEventListener('click',closePanel);
    $('[data-tti="panelCancel"]').addEventListener('click',closePanel);
    $('[data-tti="panelSave"]').addEventListener('click',closePanel);
    $$('.modal-tab',$('@panel')).forEach(t=>t.addEventListener('click',()=>{
      $$('.modal-tab',$('@panel')).forEach(x=>x.classList.remove('active')); t.classList.add('active');
      $$('.mpane',$('@panel')).forEach(p=>p.classList.toggle('active',p.dataset.pane===t.dataset.tab));
    }));
    const box=$('@statusBox'), menu=$('@statusMenu');
    box.addEventListener('click',e=>{e.stopPropagation(); const o=menu.classList.toggle('open'); box.classList.toggle('open',o);});
    $$('.status-opt',menu).forEach(opt=>opt.addEventListener('click',e=>{
      e.stopPropagation(); const ns=+opt.dataset.status; r.s=ns;
      $('@statusCurrent').innerHTML=pillFor(ns);
      $$('.status-opt',menu).forEach(o=>o.classList.toggle('current',+o.dataset.status===ns));
      menu.classList.remove('open'); box.classList.remove('open');
      render(false); // reflect in background view
    }));
  }
  function closePanel(){ $('@panel').classList.remove('open'); $('@scrim').classList.remove('open'); }
  $('@scrim').addEventListener('click',closePanel);

  /* ============ KANBAN DRAG ============ */
  function wireKanban(){ $$('.kb-card',$('@viewport')).forEach(card=>card.addEventListener('pointerdown',e=>startDrag(e,card))); }
  function startDrag(e,card){
    if(e.button!==undefined && e.button!==0) return;
    stopPlay();
    const id=card.dataset.id;
    const startX=e.clientX, startY=e.clientY;
    const canvas=$('[data-tti="canvas"]'); const canvasRect=canvas.getBoundingClientRect();
    let dragging=false, ghost=null, offX=0, offY=0, curTarget=null;
    function move(ev){
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      if(!dragging && Math.hypot(dx,dy)<5) return;
      if(!dragging){
        dragging=true;
        const cr=card.getBoundingClientRect();
        offX=(startX-cr.left)/curScale; offY=(startY-cr.top)/curScale;
        ghost=document.createElement('div'); ghost.className='kb-ghost';
        ghost.style.cssText+=`--cardc:${card.style.getPropertyValue('--cardc')}; --cardtxt:${card.style.getPropertyValue('--cardtxt')}; --cardsub:${card.style.getPropertyValue('--cardsub')}; width:${cr.width/curScale}px;`;
        ghost.innerHTML=card.innerHTML; canvas.appendChild(ghost); card.classList.add('dragging');
      }
      ghost.style.left=((ev.clientX-canvasRect.left)/curScale-offX)+'px';
      ghost.style.top=((ev.clientY-canvasRect.top)/curScale-offY)+'px';
      let found=null;
      $$('.kb-col',$('@viewport')).forEach(col=>{const cr=col.getBoundingClientRect(); if(ev.clientX>=cr.left&&ev.clientX<=cr.right&&ev.clientY>=cr.top&&ev.clientY<=cr.bottom) found=col;});
      if(found!==curTarget){ if(curTarget)curTarget.classList.remove('drop-target'); curTarget=found; if(curTarget)curTarget.classList.add('drop-target'); }
    }
    function up(){
      document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
      if(!dragging){ openPanel(id); return; }
      if(ghost) ghost.remove(); card.classList.remove('dragging');
      if(curTarget){ curTarget.classList.remove('drop-target'); const ns=+curTarget.dataset.status; const rec=ROWS.find(r=>r.id===id); if(rec&&rec.s!==ns) rec.s=ns; }
      render(false);
      const moved=$(`.kb-card[data-id="${id}"]`,$('@viewport')); if(moved) moved.style.animation='tti-rise .35s cubic-bezier(.22,.8,.3,1)';
    }
    document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  }

  /* ============ MAP ============ */
  function wireMap(){
    mapZoom=1;
    const pan=$('[data-mappan]',$('@viewport'));
    const apply=()=>{ if(pan) pan.style.transform=`scale(${mapZoom})`; };
    $$('.map-zoom div',$('@viewport')).forEach(b=>b.addEventListener('click',()=>{
      mapZoom=b.dataset.z==='in'?Math.min(2.2,mapZoom+0.25):Math.max(0.7,mapZoom-0.25); apply();
    }));
    $$('.pin',$('@viewport')).forEach((p,i)=>{
      if(i===0) p.classList.add('show-label');
      p.addEventListener('click',()=>{ stopPlay(); openPanel(p.dataset.id); });
    });
  }

  /* ============ DASHBOARD ============ */
  function wireDash(){
    $$('.dash-tab',$('@viewport')).forEach(t=>t.addEventListener('click',()=>{$$('.dash-tab',$('@viewport')).forEach(x=>x.classList.remove('active')); t.classList.add('active');}));
  }

  /* ============ SCALE TO FIT ============ */
  function fit(){
    const canvas=$('[data-tti="canvas"]'); const cw=ROOT.clientWidth; if(!cw) return;
    const pad = cw<600?0:18;
    const avail=Math.max(0,cw-pad*2);
    let s=Math.min(avail/1180,1.1); if(s<=0) return;
    curScale=s;
    canvas.style.transform=`translate(${pad}px,${pad}px) scale(${s})`;
    const h=(760*s+pad*2);
    ROOT.style.height=h+'px';
    if(window.parent!==window){ try{ window.parent.postMessage({ttiHeight:Math.ceil(h)},'*'); }catch(e){} }
  }

  /* ============ INIT ============ */
  buildTabs();
  updatePlayBtn();
  render(true);
  fit();
  window.addEventListener('resize',fit);
  setTimeout(fit,300); setTimeout(fit,1000);
  if(window.ResizeObserver) new ResizeObserver(fit).observe(ROOT);
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
})();

</script>
