<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeTonic — Hero Visual</title>
<style>
  /* =========================================================
     TimeTonic hero visual — standalone
     Pour changer la couleur d'accent : modifier --accent
     (ex. jaune/or TimeTonic : #F5B700). Les glows suivent.
     ========================================================= */
  :root {
    --navy: #1C2C39;
    --accent: #D34529;               /* <-- accent : passer à #F5B700 pour l'or */
    --accent-rgb: 211, 69, 41;       /* <-- version RGB du même accent (pour les glows) */
    --card: rgba(255,255,255,0.86);
    --line: rgba(28,44,57,0.10);
  }

  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Stage : conserve le ratio, se met à l'échelle proprement */
  .tt-stage {
    position: relative;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    aspect-ratio: 760 / 650;
    perspective: 1600px;
    perspective-origin: 50% 46%;
  }
  .tt-canvas {
    position: absolute;
    inset: 0;
    transform: rotateX(9deg) rotateY(-4deg);
    transform-origin: 50% 50%;
    /* on travaille en coordonnées 760x650 puis on scale via le conteneur */
  }
  .tt-scale {
    position: absolute;
    left: 50%;
    top: 0;
    width: 760px;
    height: 650px;
    transform-origin: top left;
    /* le scale est appliqué en JS pour rester net */
  }

  /* Glows d'ambiance */
  .tt-glow-a, .tt-glow-b { position: absolute; transform: translate(-50%,-50%); z-index: 0; pointer-events: none; }
  .tt-glow-a {
    left: 380px; top: 300px; width: 520px; height: 440px;
    background: radial-gradient(closest-side, rgba(28,44,57,0.06), rgba(28,44,57,0) 72%);
    filter: blur(4px);
  }
  .tt-glow-b {
    left: 380px; top: 262px; width: 300px; height: 240px;
    background: radial-gradient(closest-side, rgba(var(--accent-rgb),0.08), rgba(var(--accent-rgb),0) 72%);
  }

  /* Cartes */
  .tt-card {
    background: var(--card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 26px 50px -20px rgba(28,44,57,0.36), 0 2px 6px rgba(28,44,57,0.05);
    padding: 16px;
  }
  .tt-node { position: absolute; transform: translate(-50%,-50%); }

  /* Animations */
  @keyframes tt-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(var(--amp, -10px)); } }
  @keyframes tt-aiGlow {
    0%,100% { box-shadow: 0 8px 20px -8px rgba(28,44,57,0.28), 0 0 0 0 rgba(var(--accent-rgb),0); }
    50%     { box-shadow: 0 8px 20px -8px rgba(28,44,57,0.28), 0 0 24px 2px rgba(var(--accent-rgb),0.40); }
  }
  @keyframes tt-cell {
    0%,100% { background: rgba(28,44,57,0.05); }
    46%,54% { background: var(--accent); }
  }
  @keyframes tt-cellSoft {
    0%,100% { background: rgba(28,44,57,0.05); }
    46%,54% { background: rgba(var(--accent-rgb),0.42); }
  }
  @keyframes tt-blink { 0%,100% { opacity: 0.25; transform: scale(0.78); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes tt-chip { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  @media (prefers-reduced-motion: reduce) {
    .tt-float, .tt-chip-anim { animation: none !important; }
    .tt-ai-icon { animation: none !important; }
    .tt-blink-dot { animation: none !important; opacity: 0.7 !important; }
    .tt-cell-hard, .tt-cell-soft { animation: none !important; }
    .tt-dot-anim { display: none; }
  }

  /* Masque le chip sécurité sous 440px */
  .tt-chip { display: block; }

  /* Grille de la table */
  .tt-grid {
    display: grid;
    grid-template-columns: 24px 1fr 1fr 1fr;
    gap: 7px;
  }
  .tt-th { height: 16px; border-radius: 4px; background: rgba(28,44,57,0.09); display: flex; align-items: center; padding: 0 5px; }
  .tt-th-bar { height: 3.5px; border-radius: 2px; background: rgba(28,44,57,0.30); }
  .tt-idx { height: 21px; border-radius: 4px; background: rgba(28,44,57,0.05); display: flex; align-items: center; justify-content: center; }
  .tt-idx span { width: 5px; height: 5px; border-radius: 50%; background: rgba(28,44,57,0.20); }
  .tt-td { height: 21px; border-radius: 4px; background: rgba(28,44,57,0.04); display: flex; align-items: center; padding: 0 5px; }
  .tt-td-bar { height: 4px; border-radius: 2px; background: rgba(28,44,57,0.16); }
</style>
</head>
<body>
<div class="tt-stage" id="ttStage">
  <div class="tt-canvas">
    <div class="tt-scale" id="ttScale">

      <div class="tt-glow-a"></div>
      <div class="tt-glow-b"></div>

      <!-- Connecteurs -->
      <svg viewBox="0 0 760 650" width="760" height="650" style="position:absolute; inset:0; z-index:3; overflow:visible;" fill="none">
        <g stroke="rgba(28,44,57,0.30)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0.5 9" fill="none">
          <path d="M555,300 H610 V206"></path>
          <path d="M380,416 V482 H501"></path>
          <path d="M205,300 H150 V413"></path>
        </g>
        <g fill="rgba(28,44,57,0.38)">
          <circle cx="555" cy="300" r="2.6"></circle>
          <circle cx="380" cy="416" r="2.6"></circle>
          <circle cx="205" cy="300" r="2.6"></circle>
        </g>
        <g style="fill:var(--accent);" class="tt-dot-anim">
          <circle r="3.4" opacity="0" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.75));">
            <animateMotion dur="2.6s" begin="0s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear" path="M555,300 H610 V206"></animateMotion>
            <animate attributeName="opacity" dur="2.6s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.8;1"></animate>
          </circle>
          <circle r="3.4" opacity="0" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.75));">
            <animateMotion dur="2.6s" begin="0.9s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear" path="M380,416 V482 H501"></animateMotion>
            <animate attributeName="opacity" dur="2.6s" begin="0.9s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.8;1"></animate>
          </circle>
          <circle r="3.4" opacity="0" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.75));">
            <animateMotion dur="2.6s" begin="1.6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear" path="M205,300 H150 V413"></animateMotion>
            <animate attributeName="opacity" dur="2.6s" begin="1.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.8;1"></animate>
          </circle>
        </g>
      </svg>

      <!-- TABLES (centre) -->
      <div class="tt-node" style="left:380px; top:300px; z-index:2;">
        <div class="tt-float" style="animation:tt-float 9s ease-in-out infinite; --amp:-6px;">
          <div class="tt-card" style="width:352px; border-radius:24px; box-shadow:0 36px 74px -26px rgba(28,44,57,0.42), 0 3px 10px rgba(28,44,57,0.05); padding:24px;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
              <div style="width:36px; height:36px; border-radius:11px; background:var(--navy); display:flex; align-items:center; justify-content:center;">
                <svg width="19" height="19" viewBox="0 0 24 24" style="color:#fff;"><rect x="3" y="3" width="7.5" height="7.5" rx="1.6" fill="currentColor"></rect><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.6" fill="currentColor" opacity="0.55"></rect><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.6" fill="currentColor" opacity="0.55"></rect><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.6" fill="currentColor" opacity="0.55"></rect></svg>
              </div>
              <div style="font-size:18px; font-weight:700; color:var(--navy); letter-spacing:-0.015em;">Tables</div>
              <div style="flex:1;"></div>
              <div style="width:9px; height:9px; border-radius:50%; background:var(--accent);"></div>
            </div>
            <div class="tt-grid">
              <div class="tt-th"></div>
              <div class="tt-th"><div class="tt-th-bar" style="width:64%;"></div></div>
              <div class="tt-th"><div class="tt-th-bar" style="width:52%;"></div></div>
              <div class="tt-th"><div class="tt-th-bar" style="width:70%;"></div></div>

              <div class="tt-idx"><span></span></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:80%;"></div></div>
              <div class="tt-td tt-cell-soft" style="animation:tt-cellSoft 4.5s ease-in-out infinite; animation-delay:0.6s;"></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:56%;"></div></div>

              <div class="tt-idx"><span></span></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:66%;"></div></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:74%;"></div></div>
              <div class="tt-td tt-cell-hard" style="border-radius:5px; animation:tt-cell 4.5s ease-in-out infinite;"></div>

              <div class="tt-idx"><span></span></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:82%;"></div></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:60%;"></div></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:48%;"></div></div>

              <div class="tt-idx"><span></span></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:58%;"></div></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:72%;"></div></div>
              <div class="tt-td"><div class="tt-td-bar" style="width:64%;"></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ASSISTANT IA (haut droite) -->
      <div class="tt-node" style="left:610px; top:150px; z-index:5;">
        <div class="tt-float" style="animation:tt-float 6s ease-in-out infinite; animation-delay:-1.6s; --amp:-11px;">
          <div class="tt-card" style="width:186px;">
            <div style="display:flex; align-items:center; gap:11px;">
              <div class="tt-ai-icon" style="width:38px; height:38px; border-radius:12px; background:linear-gradient(150deg, rgba(var(--accent-rgb),0.14), rgba(var(--accent-rgb),0.24)); display:flex; align-items:center; justify-content:center; animation:tt-aiGlow 3s ease-in-out infinite;">
                <svg width="19" height="19" viewBox="0 0 24 24" style="color:var(--accent);"><path d="M12 2 L13.6 9.4 L21 12 L13.6 14.6 L12 22 L10.4 14.6 L3 12 L10.4 9.4 Z" fill="currentColor"></path></svg>
              </div>
              <div>
                <div style="font-size:13.5px; font-weight:700; color:var(--navy); letter-spacing:-0.01em;">Assistant IA</div>
                <div style="font-size:10.5px; font-weight:500; color:rgba(28,44,57,0.5); margin-top:1px;">Intégré aux données</div>
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:8px; margin-top:14px; padding-top:12px; border-top:1px solid rgba(28,44,57,0.07);">
              <div style="display:flex; gap:5px;">
                <div class="tt-blink-dot" style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:tt-blink 1.4s ease-in-out infinite;"></div>
                <div class="tt-blink-dot" style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:tt-blink 1.4s ease-in-out infinite; animation-delay:0.2s;"></div>
                <div class="tt-blink-dot" style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:tt-blink 1.4s ease-in-out infinite; animation-delay:0.4s;"></div>
              </div>
              <div style="font-size:10.5px; font-weight:500; color:rgba(28,44,57,0.55);">Analyse en cours</div>
            </div>
          </div>
        </div>
      </div>

      <!-- WORKFLOWS (bas droite) -->
      <div class="tt-node" style="left:600px; top:482px; z-index:5;">
        <div class="tt-float" style="animation:tt-float 8s ease-in-out infinite; animation-delay:-3s; --amp:13px;">
          <div class="tt-card" style="width:198px;">
            <div style="display:flex; align-items:center; gap:9px; margin-bottom:15px;">
              <div style="width:26px; height:26px; border-radius:8px; background:var(--navy); display:flex; align-items:center; justify-content:center;">
                <svg width="14" height="14" viewBox="0 0 24 24" style="color:#fff;"><path d="M13 2 L4 13 H11 L10 22 L20 10 H12 Z" fill="currentColor"></path></svg>
              </div>
              <div style="font-size:13.5px; font-weight:700; color:var(--navy); letter-spacing:-0.01em;">Workflows</div>
            </div>
            <div style="position:relative; height:26px;">
              <div style="position:absolute; left:13px; right:13px; top:50%; height:2px; transform:translateY(-50%); background:rgba(28,44,57,0.12); border-radius:2px;"></div>
              <div style="position:absolute; left:0; top:50%; transform:translate(0,-50%); width:26px; height:26px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px -3px rgba(var(--accent-rgb),0.5);">
                <svg width="11" height="11" viewBox="0 0 24 24" style="color:#fff;"><path d="M7 4 L19 12 L7 20 Z" fill="currentColor"></path></svg>
              </div>
              <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:24px; height:24px; border-radius:50%; background:#fff; border:2px solid rgba(28,44,57,0.16); display:flex; align-items:center; justify-content:center;">
                <svg width="11" height="11" viewBox="0 0 24 24" style="color:var(--navy);"><path d="M12 8 a4 4 0 100 8 4 4 0 000-8 z M12 2 v3 M12 19 v3 M2 12 h3 M19 12 h3 M5 5 l2 2 M17 17 l2 2 M19 5 l-2 2 M7 17 l-2 2" fill="none" stroke="currentColor" stroke-width="1.6"></path></svg>
              </div>
              <div style="position:absolute; right:0; top:50%; transform:translate(0,-50%); width:24px; height:24px; border-radius:7px; background:var(--navy); display:flex; align-items:center; justify-content:center;">
                <svg width="11" height="11" viewBox="0 0 24 24" style="color:#fff;"><path d="M5 12 l4 4 L19 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
              </div>
            </div>
            <div style="font-size:10.5px; font-weight:500; color:rgba(28,44,57,0.5); margin-top:13px;">Déclencheur&nbsp;→&nbsp;Action automatique</div>
          </div>
        </div>
      </div>

      <!-- APP MOBILE (bas gauche) -->
      <div class="tt-node" style="left:150px; top:470px; z-index:5;">
        <div class="tt-float" style="animation:tt-float 6.6s ease-in-out infinite; animation-delay:-2.2s; --amp:-9px;">
          <div class="tt-card" style="width:192px; padding:15px; display:flex; gap:14px; align-items:center;">
            <div style="width:52px; height:84px; border-radius:13px; background:linear-gradient(150deg, #26384A, var(--navy)); padding:5px; flex-shrink:0; box-shadow:0 6px 14px -6px rgba(28,44,57,0.5);">
              <div style="width:100%; height:100%; border-radius:9px; background:#fff; padding:6px; display:flex; flex-direction:column; gap:4px;">
                <div style="height:8px; border-radius:2px; background:rgba(28,44,57,0.10);"></div>
                <div style="height:5px; border-radius:2px; background:rgba(28,44,57,0.06);"></div>
                <div style="height:5px; width:75%; border-radius:2px; background:rgba(28,44,57,0.06);"></div>
                <div style="flex:1;"></div>
                <div style="height:9px; border-radius:3px; background:var(--accent); opacity:0.85;"></div>
              </div>
            </div>
            <div>
              <div style="font-size:13.5px; font-weight:700; color:var(--navy); letter-spacing:-0.01em;">App mobile</div>
              <div style="font-size:10.5px; font-weight:500; color:rgba(28,44,57,0.5); margin-top:2px; margin-bottom:10px;">Équipe · multi&#8209;appareils</div>
              <div style="display:flex; align-items:center;">
                <div style="width:22px; height:22px; border-radius:50%; background:linear-gradient(150deg, rgba(var(--accent-rgb),0.9), var(--accent)); border:2px solid #fff; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff;">A</div>
                <div style="width:22px; height:22px; border-radius:50%; background:linear-gradient(150deg,#37506A,var(--navy)); border:2px solid #fff; margin-left:-8px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff;">M</div>
                <div style="position:relative; z-index:1; width:22px; height:22px; border-radius:50%; background:#E7EAEE; border:2px solid #fff; margin-left:-8px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:rgba(28,44,57,0.62);">+5</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CHIP sécurité -->
      <div class="tt-node tt-chip" id="ttChip" style="left:372px; top:582px; z-index:6;">
        <div class="tt-chip-anim" style="animation:tt-chip 5s ease-in-out infinite; animation-delay:-1s;">
          <div style="display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(255,255,255,0.9); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--line); border-radius:999px; box-shadow:0 16px 34px -18px rgba(28,44,57,0.32);">
            <svg width="15" height="15" viewBox="0 0 24 24" style="color:var(--navy);"><path d="M12 2 L20 5 V11 C20 16.2 16.4 20.2 12 22 C7.6 20.2 4 16.2 4 11 V5 Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path><path d="M8.6 12 l2.4 2.4 L15.6 9.4" fill="none" stroke="var(--accent)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            <span style="font-size:11.5px; font-weight:600; color:rgba(28,44,57,0.78); letter-spacing:0.01em;">Hébergement souverain</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function () {
  var stage = document.getElementById('ttStage');
  var scale = document.getElementById('ttScale');
  var chip  = document.getElementById('ttChip');
  var BASE_W = 760, BASE_H = 650;

  function layout() {
    var w = stage.clientWidth || BASE_W;
    var s = Math.min(1, w / BASE_W);
    scale.style.transform = 'scale(' + s + ')';
    // recentre horizontalement après scale (origin top-left)
    scale.style.left = ((w - BASE_W * s) / 2) + 'px';
    // masque le chip sécurité quand c'est trop étroit
    chip.style.display = (w >= 440) ? 'block' : 'none';
    postHeight();
  }

  // --- postMessage auto-resize (compatible ton architecture iframe) ---
  var lastH = 0;
  function postHeight() {
    var h = Math.ceil(stage.getBoundingClientRect().height);
    if (h && h !== lastH) {
      lastH = h;
      try {
        parent.postMessage({ type: 'tt-resize', height: h }, '*');
        // format alternatif générique, au cas où ton listener attend juste un nombre
        parent.postMessage({ frameHeight: h }, '*');
      } catch (e) {}
    }
  }

  window.addEventListener('resize', layout);
  if (window.ResizeObserver) new ResizeObserver(layout).observe(stage);
  window.addEventListener('load', function () { layout(); setTimeout(postHeight, 300); });
  layout();
})();
</script>
</body>
</html>
