<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeTonic — Hero Visual (clair)</title>
<style>
  :root {
    --navy: #1C2C39;
    --accent: #D34529;
    --accent-rgb: 211, 69, 41;
    --glow-ambient: rgba(255,255,255,0.07);
    --card-bg: rgba(255,255,255,0.92);
    --card-border: rgba(255,255,255,0.6);
    --card-shadow: 0 26px 55px -18px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.2);
    --card-shadow-lg: 0 40px 80px -24px rgba(0,0,0,0.55), 0 3px 10px rgba(0,0,0,0.22);
    --text-strong: #1C2C39;
    --text-soft: rgba(28,44,57,0.5);
    --divider: rgba(28,44,57,0.07);
    --icon-navy-bg: #1C2C39;
    --icon-navy-fg: #fff;
    --ai-icon-bg: linear-gradient(150deg, rgba(211,69,41,0.14), rgba(211,69,41,0.24));
    --ai-shadow: rgba(28,44,57,0.28);
    --cell-base: rgba(28,44,57,0.05);
    --th-bg: rgba(28,44,57,0.09);
    --th-bar: rgba(28,44,57,0.30);
    --td-bg: rgba(28,44,57,0.04);
    --td-bar: rgba(28,44,57,0.16);
    --idx-dot: rgba(28,44,57,0.20);
    --conn-line: rgba(255,255,255,0.35);
    --conn-anchor: rgba(255,255,255,0.5);
    --wf-track: rgba(28,44,57,0.12);
    --wf-mid-bg: #fff;
    --wf-mid-border: rgba(28,44,57,0.16);
    --phone-screen: #fff;
    --phone-l1: rgba(28,44,57,0.10);
    --phone-l2: rgba(28,44,57,0.06);
    --avatar-ring: #fff;
    --avatar-plus-bg: #E7EAEE;
    --avatar-plus-fg: rgba(28,44,57,0.62);
    --chip-bg: rgba(255,255,255,0.95);
    --chip-text: rgba(28,44,57,0.78);
  }
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  /* Le stage occupe tout le conteneur (= moitié droite du hero) */
  .tt-stage {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    perspective: 1600px;
    perspective-origin: 50% 50%;
    overflow: hidden;
  }
  .tt-scale {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 760px;
    height: 650px;
    transform-origin: center center;
    /* transform appliqué en JS : translate(-50%,-50%) scale(s) + rotation 3D */
  }
  .tt-glow-a, .tt-glow-b { position: absolute; transform: translate(-50%,-50%); z-index: 0; pointer-events: none; }
  .tt-glow-a {
    left: 380px; top: 300px; width: 560px; height: 480px;
    background: radial-gradient(closest-side, var(--glow-ambient), transparent 72%);
    filter: blur(6px);
  }
  .tt-glow-b {
    left: 380px; top: 262px; width: 320px; height: 260px;
    background: radial-gradient(closest-side, rgba(var(--accent-rgb),0.10), rgba(var(--accent-rgb),0) 72%);
  }
  .tt-card {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    box-shadow: var(--card-shadow);
    padding: 16px;
  }
  .tt-node { position: absolute; transform: translate(-50%,-50%); }
  .tt-title { color: var(--text-strong); }
  .tt-sub { color: var(--text-soft); }

  @keyframes tt-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(var(--amp, -10px)); } }
  @keyframes tt-aiGlow {
    0%,100% { box-shadow: 0 8px 20px -8px var(--ai-shadow), 0 0 0 0 rgba(var(--accent-rgb),0); }
    50%     { box-shadow: 0 8px 20px -8px var(--ai-shadow), 0 0 24px 2px rgba(var(--accent-rgb),0.45); }
  }
  @keyframes tt-cell {
    0%,100% { background: var(--cell-base); }
    46%,54% { background: var(--accent); }
  }
  @keyframes tt-cellSoft {
    0%,100% { background: var(--cell-base); }
    46%,54% { background: rgba(var(--accent-rgb),0.42); }
  }
  @keyframes tt-blink { 0%,100% { opacity: 0.25; transform: scale(0.78); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes tt-chip { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @media (prefers-reduced-motion: reduce) {
    .tt-float, .tt-chip-anim, .tt-ai-icon, .tt-blink-dot, .tt-cell-hard, .tt-cell-soft { animation: none !important; }
    .tt-blink-dot { opacity: 0.7 !important; }
    .tt-dot-anim { display: none; }
  }
  .tt-chip { display: block; }
  .tt-grid { display: grid; grid-template-columns: 24px 1fr 1fr 1fr; gap: 7px; }
  .tt-th { height: 16px; border-radius: 4px; background: var(--th-bg); display: flex; align-items: center; padding: 0 5px; }
  .tt-th-bar { height: 3.5px; border-radius: 2px; background: var(--th-bar); }
  .tt-idx { height: 21px; border-radius: 4px; background: var(--cell-base); display: flex; align-items: center; justify-content: center; }
  .tt-idx span { width: 5px; height: 5px; border-radius: 50%; background: var(--idx-dot); }
  .tt-td { height: 21px; border-radius: 4px; background: var(--td-bg); display: flex; align-items: center; padding: 0 5px; }
  .tt-td-bar { height: 4px; border-radius: 2px; background: var(--td-bar); }
  .tt-conn-line { stroke: var(--conn-line); }
  .tt-conn-anchor { fill: var(--conn-anchor); }
</style>
</head>
<body>
<div class="tt-stage" id="ttStage">
  <div class="tt-scale" id="ttScale">

    <div class="tt-glow-a"></div>
    <div class="tt-glow-b"></div>

    <svg viewBox="0 0 760 650" width="760" height="650" style="position:absolute; inset:0; z-index:3; overflow:visible;" fill="none">
      <g class="tt-conn-line" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0.5 9" fill="none">
        <path d="M555,300 H610 V206"></path>
        <path d="M380,416 V482 H501"></path>
        <path d="M205,300 H150 V413"></path>
      </g>
      <g class="tt-conn-anchor">
        <circle cx="555" cy="300" r="2.6"></circle>
        <circle cx="380" cy="416" r="2.6"></circle>
        <circle cx="205" cy="300" r="2.6"></circle>
      </g>
      <g style="fill:var(--accent);" class="tt-dot-anim">
        <circle r="3.4" opacity="0" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.8));">
          <animateMotion dur="2.6s" begin="0s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear" path="M555,300 H610 V206"></animateMotion>
          <animate attributeName="opacity" dur="2.6s" begin="0s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.8;1"></animate>
        </circle>
        <circle r="3.4" opacity="0" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.8));">
          <animateMotion dur="2.6s" begin="0.9s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear" path="M380,416 V482 H501"></animateMotion>
          <animate attributeName="opacity" dur="2.6s" begin="0.9s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.8;1"></animate>
        </circle>
        <circle r="3.4" opacity="0" style="filter:drop-shadow(0 0 5px rgba(var(--accent-rgb),0.8));">
          <animateMotion dur="2.6s" begin="1.6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear" path="M205,300 H150 V413"></animateMotion>
          <animate attributeName="opacity" dur="2.6s" begin="1.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.8;1"></animate>
        </circle>
      </g>
    </svg>

    <!-- TABLES -->
    <div class="tt-node" style="left:380px; top:300px; z-index:2;">
      <div class="tt-float" style="animation:tt-float 9s ease-in-out infinite; --amp:-6px;">
        <div class="tt-card" style="width:352px; border-radius:24px; box-shadow:var(--card-shadow-lg); padding:24px;">
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
            <div style="width:36px; height:36px; border-radius:11px; background:var(--icon-navy-bg); display:flex; align-items:center; justify-content:center;">
              <svg width="19" height="19" viewBox="0 0 24 24" style="color:var(--icon-navy-fg);"><rect x="3" y="3" width="7.5" height="7.5" rx="1.6" fill="currentColor"></rect><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.6" fill="currentColor" opacity="0.55"></rect><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.6" fill="currentColor" opacity="0.55"></rect><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.6" fill="currentColor" opacity="0.55"></rect></svg>
            </div>
            <div class="tt-title" style="font-size:18px; font-weight:700; letter-spacing:-0.015em;">Tables</div>
            <div style="flex:1;"></div>
            <div style="width:9px; height:9px; border-radius:50%; background:var(--accent);"></div>
          </div>
          <div class="tt-grid">
            <div class="tt-th"></div>
            <div class="tt-th"><div class="tt-th-bar" style="width:64%;"></div></div>
            <div class="tt-th"><div class="tt-th-bar" style="width:52%;"></div></div>
            <div class="tt-th"><div class="tt-th-bar" style="width:70%;"></div></div>
            <div class="tt-idx"><span></span></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:80%;"></div></div>
            <div class="tt-td tt-cell-soft" style="animation:tt-cellSoft 4.5s ease-in-out infinite; animation-delay:0.6s;"></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:56%;"></div></div>
            <div class="tt-idx"><span></span></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:66%;"></div></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:74%;"></div></div>
            <div class="tt-td tt-cell-hard" style="border-radius:5px; animation:tt-cell 4.5s ease-in-out infinite;"></div>
            <div class="tt-idx"><span></span></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:82%;"></div></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:60%;"></div></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:48%;"></div></div>
            <div class="tt-idx"><span></span></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:58%;"></div></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:72%;"></div></div>
            <div class="tt-td"><div class="tt-td-bar" style="width:64%;"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ASSISTANT IA -->
    <div class="tt-node" style="left:610px; top:150px; z-index:5;">
      <div class="tt-float" style="animation:tt-float 6s ease-in-out infinite; animation-delay:-1.6s; --amp:-11px;">
        <div class="tt-card" style="width:186px;">
          <div style="display:flex; align-items:center; gap:11px;">
            <div class="tt-ai-icon" style="width:38px; height:38px; border-radius:12px; background:var(--ai-icon-bg); display:flex; align-items:center; justify-content:center; animation:tt-aiGlow 3s ease-in-out infinite;">
              <svg width="19" height="19" viewBox="0 0 24 24" style="color:var(--accent);"><path d="M12 2 L13.6 9.4 L21 12 L13.6 14.6 L12 22 L10.4 14.6 L3 12 L10.4 9.4 Z" fill="currentColor"></path></svg>
            </div>
            <div>
              <div class="tt-title" style="font-size:13.5px; font-weight:700; letter-spacing:-0.01em;">Assistant IA</div>
              <div class="tt-sub" style="font-size:10.5px; font-weight:500; margin-top:1px;">Intégré aux données</div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:8px; margin-top:14px; padding-top:12px; border-top:1px solid var(--divider);">
            <div style="display:flex; gap:5px;">
              <div class="tt-blink-dot" style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:tt-blink 1.4s ease-in-out infinite;"></div>
              <div class="tt-blink-dot" style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:tt-blink 1.4s ease-in-out infinite; animation-delay:0.2s;"></div>
              <div class="tt-blink-dot" style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:tt-blink 1.4s ease-in-out infinite; animation-delay:0.4s;"></div>
            </div>
            <div class="tt-sub" style="font-size:10.5px; font-weight:500;">Analyse en cours</div>
          </div>
        </div>
      </div>
    </div>

    <!-- WORKFLOWS -->
    <div class="tt-node" style="left:600px; top:482px; z-index:5;">
      <div class="tt-float" style="animation:tt-float 8s ease-in-out infinite; animation-delay:-3s; --amp:13px;">
        <div class="tt-card" style="width:198px;">
          <div style="display:flex; align-items:center; gap:9px; margin-bottom:15px;">
            <div style="width:26px; height:26px; border-radius:8px; background:var(--icon-navy-bg); display:flex; align-items:center; justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" style="color:var(--icon-navy-fg);"><path d="M13 2 L4 13 H11 L10 22 L20 10 H12 Z" fill="currentColor"></path></svg>
            </div>
            <div class="tt-title" style="font-size:13.5px; font-weight:700; letter-spacing:-0.01em;">Workflows</div>
          </div>
          <div style="position:relative; height:26px;">
            <div style="position:absolute; left:13px; right:13px; top:50%; height:2px; transform:translateY(-50%); background:var(--wf-track); border-radius:2px;"></div>
            <div style="position:absolute; left:0; top:50%; transform:translate(0,-50%); width:26px; height:26px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px -3px rgba(var(--accent-rgb),0.5);">
              <svg width="11" height="11" viewBox="0 0 24 24" style="color:#fff;"><path d="M7 4 L19 12 L7 20 Z" fill="currentColor"></path></svg>
            </div>
            <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:24px; height:24px; border-radius:50%; background:var(--wf-mid-bg); border:2px solid var(--wf-mid-border); display:flex; align-items:center; justify-content:center;">
              <svg width="11" height="11" viewBox="0 0 24 24" style="color:var(--text-strong);"><path d="M12 8 a4 4 0 100 8 4 4 0 000-8 z M12 2 v3 M12 19 v3 M2 12 h3 M19 12 h3 M5 5 l2 2 M17 17 l2 2 M19 5 l-2 2 M7 17 l-2 2" fill="none" stroke="currentColor" stroke-width="1.6"></path></svg>
            </div>
            <div style="position:absolute; right:0; top:50%; transform:translate(0,-50%); width:24px; height:24px; border-radius:7px; background:var(--icon-navy-bg); display:flex; align-items:center; justify-content:center;">
              <svg width="11" height="11" viewBox="0 0 24 24" style="color:var(--icon-navy-fg);"><path d="M5 12 l4 4 L19 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </div>
          </div>
          <div class="tt-sub" style="font-size:10.5px; font-weight:500; margin-top:13px;">Déclencheur&nbsp;→&nbsp;Action automatique</div>
        </div>
      </div>
    </div>

    <!-- APP MOBILE -->
    <div class="tt-node" style="left:150px; top:470px; z-index:5;">
      <div class="tt-float" style="animation:tt-float 6.6s ease-in-out infinite; animation-delay:-2.2s; --amp:-9px;">
        <div class="tt-card" style="width:192px; padding:15px; display:flex; gap:14px; align-items:center;">
          <div style="width:52px; height:84px; border-radius:13px; background:linear-gradient(150deg, #26384A, var(--navy)); padding:5px; flex-shrink:0; box-shadow:0 6px 14px -6px rgba(28,44,57,0.5);">
            <div style="width:100%; height:100%; border-radius:9px; background:var(--phone-screen); padding:6px; display:flex; flex-direction:column; gap:4px;">
              <div style="height:8px; border-radius:2px; background:var(--phone-l1);"></div>
              <div style="height:5px; border-radius:2px; background:var(--phone-l2);"></div>
              <div style="height:5px; width:75%; border-radius:2px; background:var(--phone-l2);"></div>
              <div style="flex:1;"></div>
              <div style="height:9px; border-radius:3px; background:var(--accent); opacity:0.85;"></div>
            </div>
          </div>
          <div>
            <div class="tt-title" style="font-size:13.5px; font-weight:700; letter-spacing:-0.01em;">App mobile</div>
            <div class="tt-sub" style="font-size:10.5px; font-weight:500; margin-top:2px; margin-bottom:10px;">Équipe · multi&#8209;appareils</div>
            <div style="display:flex; align-items:center;">
              <div style="width:22px; height:22px; border-radius:50%; background:linear-gradient(150deg, rgba(var(--accent-rgb),0.9), var(--accent)); border:2px solid var(--avatar-ring); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff;">A</div>
              <div style="width:22px; height:22px; border-radius:50%; background:linear-gradient(150deg,#37506A,var(--navy)); border:2px solid var(--avatar-ring); margin-left:-8px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff;">M</div>
              <div style="position:relative; z-index:1; width:22px; height:22px; border-radius:50%; background:var(--avatar-plus-bg); border:2px solid var(--avatar-ring); margin-left:-8px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--avatar-plus-fg);">+5</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CHIP -->
    <div class="tt-node tt-chip" id="ttChip" style="left:372px; top:582px; z-index:6;">
      <div class="tt-chip-anim" style="animation:tt-chip 5s ease-in-out infinite; animation-delay:-1s;">
        <div style="display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--chip-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--card-border); border-radius:999px; box-shadow:0 16px 34px -18px rgba(0,0,0,0.4);">
          <svg width="15" height="15" viewBox="0 0 24 24" style="color:var(--text-strong);"><path d="M12 2 L20 5 V11 C20 16.2 16.4 20.2 12 22 C7.6 20.2 4 16.2 4 11 V5 Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path><path d="M8.6 12 l2.4 2.4 L15.6 9.4" fill="none" stroke="var(--accent)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          <span style="font-size:11.5px; font-weight:600; color:var(--chip-text); letter-spacing:0.01em;">Hébergement souverain</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  var stage = document.getElementById('ttStage');
  var scale = document.getElementById('ttScale');
  var chip  = document.getElementById('ttChip');
  var BASE_W = 760, BASE_H = 650;
  function layout() {
    var w = stage.clientWidth || BASE_W;
    var h = stage.clientHeight || BASE_H;
    // remplit la zone : on prend le plus grand scale qui tient dans le conteneur
    // (avec une marge pour ne pas rogner les briques flottantes)
    var s = Math.min(w / BASE_W, h / BASE_H) * 0.98;
    s = Math.max(s, 0.35);
    scale.style.transform = 'translate(-50%,-50%) scale(' + s + ') rotateX(8deg) rotateY(-4deg)';
    chip.style.display = (w >= 380) ? 'block' : 'none';
  }
  window.addEventListener('resize', layout);
  if (window.ResizeObserver) new ResizeObserver(layout).observe(stage);
  window.addEventListener('load', layout);
  layout();
})();
</script>
</body>
</html>
